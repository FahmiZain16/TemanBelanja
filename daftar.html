<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teman Belanja - Daftar</title>

<style>

body {
font-family: Arial, sans-serif;
margin: 0;
background: #f9fafc;
color: #333;
}

.app {
max-width: 450px;
margin: 45px auto;
background: #fff;
border-radius: 12px;
box-shadow: 0 3px 14px rgba(20, 35, 65, 0.12);
padding: 24px;
}

h1 {
text-align: center;
color: #2a3a58;
}

input {
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #ddd;
}

button {
margin-top:10px;
width:100%;
padding:10px;
border:0;
border-radius:8px;
background:#2f69ff;
color:white;
font-weight:700;
cursor:pointer;
}

button.secondary {
background:#5c6eb7;
}

.item {
padding:12px;
border-radius:8px;
border:1px solid #eee;
margin-top:8px;
cursor:pointer;
transition:0.2s;
display:flex;
align-items:center;
justify-content:space-between;
}

.item:hover {
background:#f3f6ff;
border-color:#2f69ff;
}

.item-left {
display:flex;
align-items:center;
gap:10px;
}

.checkbox {
width:18px;
height:18px;
}

.modal {
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-box {
background:white;
padding:20px;
border-radius:10px;
width:350px;
}

.link-btn {
display:block;
text-align:center;
padding:8px;
background:#2f69ff;
color:white;
border-radius:6px;
margin-top:10px;
text-decoration:none;
}

.close-btn {
background:#999;
}

</style>

</head>

<body>

<div class="app">

<h1>Daftar Belanja</h1>

<input id="nama" placeholder="Nama Barang">
<input id="jumlah" placeholder="Jumlah">
<input id="harga" placeholder="Harga (optional)">

<button onclick="tambah()">Tambah Barang</button>

<hr>

<div id="list"></div>

<button class="secondary" onclick="location.href='dashboard.html'">
← Kembali
</button>

</div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-box">

<h3 id="modal-nama"></h3>

<p>Jumlah : <span id="modal-jumlah"></span></p>
<p>Harga : <span id="modal-harga"></span></p>

<a id="google-link" target="_blank" class="link-btn">
Cek Harga Google
</a>

<a id="shop-link" target="_blank" class="link-btn">
Beli Online
</a>

<button class="close-btn" onclick="closeModal()">
Tutup
</button>

</div>

</div>


<script>

let items = []

function tambah(){

let nama = document.getElementById("nama").value
let jumlah = document.getElementById("jumlah").value
let harga = document.getElementById("harga").value

items.push({
nama,
jumlah,
harga,
checked:false
})

render()

}

function render(){

let html = ""

items.forEach((item,index)=>{

html += `

<div class="item" onclick="review(${index})">

<div class="item-left">

<input 
type="checkbox"
class="checkbox"
${item.checked ? "checked":""}
onclick="toggle(${index},event)"
>

<div>

<b>${item.nama}</b>
<br>
<small>${item.jumlah} item</small>

</div>

</div>

<div>

➡️

</div>

</div>

`

})

document.getElementById("list").innerHTML = html

}

function toggle(index,e){

e.stopPropagation()

items[index].checked = !items[index].checked

render()

}

function review(index){

let item = items[index]

document.getElementById("modal-nama").innerText = item.nama
document.getElementById("modal-jumlah").innerText = item.jumlah
document.getElementById("modal-harga").innerText = item.harga || "Belum ada"

let google = `https://www.google.com/search?q=${item.nama}`
let shop = `https://www.tokopedia.com/search?q=${item.nama}`

document.getElementById("google-link").href = google
document.getElementById("shop-link").href = shop

document.getElementById("modal").style.display = "flex"

}

function closeModal(){
document.getElementById("modal").style.display = "none"
}

</script>

</body>
</html>
