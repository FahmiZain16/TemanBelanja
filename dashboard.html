<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teman Belanja - Dashboard</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f9fafc;
        color: #333;
      }
      .app {
        max-width: 450px;
        margin: 45px auto;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 3px 14px rgba(20, 35, 65, 0.12);
        padding: 24px;
      }
      h1 {
        text-align: center;
        color: #2a3a58;
        margin-bottom: 6px;
      }
      p.subtitle {
        text-align: center;
        margin-top: 0;
        color: #5e6e89;
      }
      .action-buttons {
        display: grid;
        gap: 10px;
        margin-top: 16px;
      }
      button {
        margin-top: 16px;
        width: 100%;
        padding: 10px;
        border: 0;
        border-radius: 8px;
        background: #2f69ff;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }
      button.secondary {
        background: #5c6eb7;
      }
      .message {
        margin-top: 12px;
        font-size: 0.9rem;
        min-height: 20px;
      }
      .error {
        color: #c43030;
      }
      .success {
        color: #1c7d1c;
      }
      .top-right {
        text-align: right;
        margin-bottom: 12px;
      }
      .badge {
        font-size: 0.86rem;
        color: #fff;
        background: #3f6d47;
        padding: 4px 8px;
        border-radius: 999px;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="top-right">
        <span class="badge" id="welcome-label"></span>
        <button
          id="logout-btn"
          class="secondary"
          style="width: auto; margin-left: 10px; padding: 6px 12px"
        >
          Keluar
        </button>
      </div>
      <h1>TEMAN BELANJA</h1>
      <p class="subtitle">
        Dashboard - Selamat datang! Pilih menu berikut untuk melanjutkan:
      </p>
      <div class="action-buttons">
        <button id="btn-daftar">Daftar Belanja</button>
        <button id="btn-inventaris">Inventaris</button>
        <button id="btn-keuangan">Hitung Keuangan</button>
      </div>
      <div class="message" id="dashboard-message"></div>
    </div>

    <script>
      const sessionKey = "teman_belanja_current_user";

      function getCurrentUser() {
        const cookies = document.cookie.split(";");
        for (let cookie of cookies) {
          const [name, value] = cookie.trim().split("=");
          if (name === "teman_belanja_current_user") {
            return decodeURIComponent(value);
          }
        }
        const fallback = localStorage.getItem("teman_belanja_current_user");
        return fallback ? fallback : null;
      }
      function sanitize(text) {
        const d = document.createElement("div");
        d.innerText = text || "";
        return d.innerHTML;
      }

      function showMessage(id, text, type = "error") {
        const el = document.getElementById(id);
        el.className = "message " + (type === "success" ? "success" : "error");
        el.innerText = text;
      }

      function notifyNative(message) {
        if (typeof webui_fn === "function") {
          console.log("Mengirim event ke native:", message);
          switch (message) {
            case "daftar":
              webui_fn("handle_daftar");
              break;
            case "inventaris":
              webui_fn("handle_inventaris");
              break;
            case "keuangan":
              webui_fn("handle_keuangan");
              break;
            case "logout":
              webui_fn("handle_logout");
              break;
          }
        } else {
          showMessage(
            "dashboard-message",
            `Aksi: ${message}. (webui_fn tidak tersedia di mode browser)`,
            "success",
          );
        }
      }

      function renderView() {
        const currentUser = getCurrentUser();
        if (!currentUser) {
          // Jika tidak ada session, kembali ke login
          if (typeof webui_fn === "function") {
            webui_fn("handle_back_to_login");
          } else {
            window.location.href = "login.html";
          }
          return;
        }
        document.getElementById("welcome-label").textContent =
          `Hai ${sanitize(currentUser)}`;
        document.title = `Teman Belanja - Dashboard`;
      }

      document.getElementById("logout-btn").addEventListener("click", () => {
        if (typeof webui_fn === "function") {
          webui_fn("handle_logout");
        } else {
          document.cookie =
            "teman_belanja_current_user=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
          localStorage.removeItem("teman_belanja_current_user");
          window.location.href = "login.html";
        }
      });

      document
        .getElementById("btn-daftar")
        .addEventListener("click", () => notifyNative("daftar"));
      document
        .getElementById("btn-inventaris")
        .addEventListener("click", () => notifyNative("inventaris"));
      document
        .getElementById("btn-keuangan")
        .addEventListener("click", () => notifyNative("keuangan"));

      document.addEventListener("DOMContentLoaded", renderView);
      renderView();
    </script>
  </body>
</html>
